<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - IMPERIAL DESIGN</title>
    <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1ceGDdKA3n-lv3325rL_0l6_BqNmGqBEB">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lora', serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background: #111;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin: 20px 0;
        }
        .register-container h2 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
            color: #b6ff3b;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .register-container input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #444;
            border-radius: 5px;
            background: #222;
            color: #fff;
            font-size: 1rem;
        }
        .full-width {
            grid-column: span 2;
        }
        .register-container button {
            grid-column: span 2;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 5px;
            background: #b6ff3b;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .register-container button:hover {
            background: #a3e635;
        }
        .register-container p {
            margin-top: 1rem;
        }
        .register-container a {
            color: #b6ff3b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Crear Cuenta</h2>
        <form id="registerForm">
            <div class="form-grid">
                <input type="text" id="regNombre" placeholder="Nombre" required>
                <input type="text" id="regApellidos" placeholder="Apellidos" required>
                
                <input type="email" id="regEmail" placeholder="Correo Electrónico" class="full-width" required>
                
                <input type="password" id="regPass" placeholder="Contraseña" class="full-width" required>
                <input type="password" id="regPassConfirm" placeholder="Confirmar Contraseña" class="full-width" required>
                
                <button type="submit">Registrarse</button>
            </div>
        </form>
        <p id="regMsg" style="margin-top: 10px; color: #ff6b6b;"></p>
        <p>¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a></p>
    </div>
    <!-- Cargar Supabase y script de autenticación -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
