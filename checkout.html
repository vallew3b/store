<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout - Urban Pulse</title>
  <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1ceGDdKA3n-lv3325rL_0l6_BqNmGqBEB">
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lora', serif; background: #000; color: #fff; }
    .container { background: #111; border-radius: 10px; margin-top: 40px; padding: 30px !important; }
    h2 { color: #b6ff3b; text-align: center; margin-bottom: 20px; }
    input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem; }
    .btn { background: #b6ff3b; color: #000; font-weight: bold; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
    .btn:hover { background: #a3e635; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full-width { grid-column: span 2; }
    #orderSummary { background: #1a1a1a; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #b6ff3b; }
  </style>
</head>
<body>
  <div class="container" style="max-width:700px">
    <h2>Finalizar Pedido</h2>
    <div id="orderSummary"></div>
    <form id="checkoutForm" class="form-grid">
      <input id="cName" placeholder="Nombre completo" class="full-width" required />
      <input id="cEmail" placeholder="Correo Electrónico" class="full-width" required />
      <input id="cPhone" placeholder="Teléfono" class="full-width" required />
      
      <input id="cCalle" placeholder="Calle y Número" class="full-width" required />
      <input id="cColonia" placeholder="Colonia" required />
      <input id="cCiudad" placeholder="Ciudad" required />
      <input id="cEstado" placeholder="Estado" required />
      <input id="cCP" placeholder="Código Postal" required />
      
      <button class="btn full-width" type="submit">Realizar Pedido por WhatsApp</button>
    </form>
    <div id="checkoutMsg" style="margin-top:12px; text-align: center;"></div>
  </div>
  <!-- Supabase para guardar dirección si está logueado -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
